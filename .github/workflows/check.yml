name: check

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: this job only reads the repo. id-token is granted so
# codecov-action can use OIDC (tokenless) upload on the public repo.
permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to commit SHAs (with the version in a
      # comment) for supply-chain integrity; Renovate keeps the pins updated.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # rust-toolchain.toml pins the channel and components (rustfmt, clippy, llvm-tools-preview).
      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2.82.10
        with:
          tool: just,cargo-nextest,cargo-llvm-cov

      - name: just check
        run: just check

      # Coverage is hard-enforced in `just check` via cargo-llvm-cov's
      # --fail-under-* thresholds, so a failed upload must not fail CI here.
      # use_oidc drives tokenless upload via the id-token granted above.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          use_oidc: true
          files: cov.json
          fail_ci_if_error: false
