name: check

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: this job only reads the repo. id-token is granted so
# codecov-action can use OIDC (tokenless) upload on the public repo.
permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to commit SHAs (with the version in a
      # comment) for supply-chain integrity; Renovate keeps the pins updated.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # rust-toolchain.toml pins the channel and components (rustfmt, clippy, llvm-tools-preview).
      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2.82.10
        with:
          tool: just,cargo-nextest,cargo-llvm-cov

      # `just check` runs coverage-e2e (see just/coverage.just), which shells out
      # to the reportage CLI. Install it with the official setup action, pinned to
      # a commit SHA (it has no release tags yet) like the other third-party
      # actions above. `version` pins the CLI binary to the release used locally;
      # bump it in lockstep with local reportage upgrades. Note: the action still
      # fetches reportage's install.sh from its main branch at run time, so only
      # the CLI binary is version-pinned, not the installer script itself.
      - uses: tooppoo/reportage-actions/setup@57256bb4c6a89429c4c37133d1619436921263e3 # main
        with:
          # 0.0.6 is required by e2e/summon_lockfile.repor (`document file` and `before_each`).
          version: "0.0.6"

      - name: just check
        run: just check

      # Coverage is hard-enforced in `just check` via cargo-llvm-cov's
      # --fail-under-* thresholds, so a failed upload must not fail CI here.
      # use_oidc drives tokenless upload via the id-token granted above.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: cov.json
          fail_ci_if_error: false

  installer-smoke-test:
    uses: tooppoo/github-release-workflows/.github/workflows/wf-installer-smoke-test.yml@main
    with:
      config_path: .github/workflows/artifacts.manifest.json
