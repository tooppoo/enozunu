name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

jobs:
  check-ready:
    name: Check release readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: tooppoo/rellog-actions/setup@2abfca180ea8f95dc3d77be64b25b4bc33a0b380 # 0.1.0

      - name: Check release is ready
        run: rellog ready ${{ github.ref_name }}

  setup-artifacts:
    uses: tooppoo/github-release-workflows/.github/workflows/wf-cross-platform-build.yml@9e11ee50a835c66f9dc7408029c16c3de00d93f4 # main
    needs: check-ready
    with:
      config_path: .github/workflows/artifacts.manifest.json

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: setup-artifacts
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Get all archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.setup-artifacts.outputs.artifact_name }}
          path: dist

      - name: Create GitHub Release
        uses: tooppoo/rellog-actions/create-gh-release@2abfca180ea8f95dc3d77be64b25b4bc33a0b380 # 0.1.0
        with:
          release-id: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
